<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
		<title>집에 가고 싶다</title>
		<meta name="theme-color" content="#001833">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<style>
html, body {
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	min-height: 100vh;
	min-height: 100dvh;
	background: #001833;
	overflow: hidden;
	position: fixed;
	inset: 0;
	touch-action: none;
	-webkit-user-select: none;
	user-select: none;
	-webkit-tap-highlight-color: transparent;
}

#game {
	display: block;
	width: 100vw;
	height: 100vh;
	height: 100dvh;
	background: #001833;
	touch-action: none;
}

#fallback {
	box-sizing: border-box;
	display: none;
	position: fixed;
	inset: 0;
	padding: 2rem;
	align-items: center;
	justify-content: center;
	text-align: center;
	color: #e8fbff;
	font: 700 1.15rem/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
	background: #001833;
}
		</style>
	</head>
	<body>
		<canvas id="game"></canvas>
		<div id="fallback">이 브라우저에서는 캔버스를 시작할 수 없습니다.<br>Chrome 또는 Safari 최신 버전으로 열어주세요.</div>
		<script src="mobile-game.js" defer></script>
	</body>
</html>
