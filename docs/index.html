<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
		<title>집에 가고 싶다</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
	min-height: 100vh;
	min-height: 100dvh;
}

body {
	color: white;
	background-color: #001833;
	overflow: hidden;
	touch-action: none;
	position: fixed;
	inset: 0;
	-webkit-user-select: none;
	user-select: none;
	-webkit-tap-highlight-color: transparent;
}

#canvas {
	display: block;
	width: 100vw !important;
	height: 100vh !important;
	height: 100dvh !important;
	max-width: 100vw;
	max-height: 100vh;
	max-height: 100dvh;
	background-color: #001833;
	object-fit: cover;
	touch-action: none;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #001833;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	z-index: 10;
	font-family: 'Noto Sans KR', 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	text-align: center;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	position: static;
	width: min(72vw, 28rem);
	height: 0.65rem;
	margin: 0 auto;
	accent-color: #5eeaff;
	filter: drop-shadow(0 0 0.9rem rgba(94, 234, 255, 0.75));
}

#loading-copy {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 0.45rem;
	margin-bottom: 1.4rem;
	color: #f7fdff;
	text-shadow: 0 0 0.75rem rgba(0, 182, 255, 0.9), 0 0 1.6rem rgba(0, 99, 255, 0.65);
}

#loading-copy strong {
	font-size: clamp(1.6rem, 8vw, 3rem);
	line-height: 1;
}

#loading-copy span {
	color: #bff7ff;
	font-size: clamp(0.95rem, 4vw, 1.25rem);
	font-weight: 700;
	letter-spacing: 0;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	max-width: 28rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#001833">
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--false fullsize--false use-filter--true" src="" alt="">
			<div id="loading-copy" aria-live="polite">
				<strong>집에 가고 싶다</strong>
				<span>게임 불러오는 중...</span>
			</div>
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"index","experimentalVK":false,"focusCanvas":true,"gdextensionLibs":[],"mainPack":"game-smooth.pck","fileSizes":{"game-smooth.pck":2966712,"index.wasm":37695054}};
const GODOT_THREADS_ENABLED = false;
const GODOT_CANVAS = document.getElementById('canvas');
GODOT_CONFIG.canvas = GODOT_CANVAS;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const canvas = GODOT_CANVAS;
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function fitCanvasToViewport() {
		const viewport = window.visualViewport;
		const width = Math.max(1, Math.round(viewport ? viewport.width : window.innerWidth));
		const height = Math.max(1, Math.round(viewport ? viewport.height : window.innerHeight));
		canvas.style.width = `${width}px`;
		canvas.style.height = `${height}px`;
		canvas.style.maxWidth = `${width}px`;
		canvas.style.maxHeight = `${height}px`;
	}

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		fitCanvasToViewport();
		window.addEventListener('resize', fitCanvasToViewport, { passive: true });
		window.addEventListener('orientationchange', () => {
			setTimeout(fitCanvasToViewport, 120);
		}, { passive: true });
		if (window.visualViewport) {
			window.visualViewport.addEventListener('resize', fitCanvasToViewport, { passive: true });
			window.visualViewport.addEventListener('scroll', fitCanvasToViewport, { passive: true });
		}

		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			fitCanvasToViewport();
			requestAnimationFrame(fitCanvasToViewport);
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
